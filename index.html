<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scheepskompas — Terrein Navigatie</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;700&display=swap');

  :root {
    --brass:       #c9972a;
    --brass-dark:  #7a5c0a;
    --cream:       #f0e0b0;
    --bg:          #110b05;
    --red-dest:    #cc2222;
    --gold-home:   #ffd700;
    --green-vac:   #2ecc71;
    --orange-pers: #ff8c00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'IM Fell English', Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 10px 8px 28px;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.85rem, 3vw, 1.15rem);
    letter-spacing: 0.18em;
    color: var(--brass);
    text-align: center;
    margin-bottom: 8px;
    text-shadow: 0 0 18px rgba(200,150,40,0.4);
  }

  /* ── KOMPAS WRAP ── */
  .compass-wrap {
    position: relative;
    width: min(92vw, 430px);
    height: min(92vw, 430px);
    flex-shrink: 0;
  }

  .compass-rim {
    position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(
      #7a5c0a 0deg,#c9972a 45deg,#f0c040 90deg,#c9972a 135deg,
      #7a5c0a 180deg,#c9972a 225deg,#f0c040 270deg,#c9972a 315deg,#7a5c0a 360deg);
    box-shadow: 0 0 0 4px #2a1c04,0 0 40px 8px rgba(0,0,0,.85),inset 0 0 12px rgba(0,0,0,.6);
  }

  .degree-ring {
    position: absolute; inset: 5%; border-radius: 50%;
    background: #1e160a; z-index: 2;
  }
  svg#ring-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 3; }

  /* ── KAARTVENSTER ── */
  .map-viewport {
    position: absolute; inset: 17%;
    border-radius: 50%; overflow: hidden;
    z-index: 4;
    box-shadow: inset 0 0 20px rgba(0,0,0,.65), 0 0 0 2px #4a3605;
    background: #3a4a3a;
  }

  /* Kaart 200% groot zodat rotatie nooit witte rand toont */
  #map {
    position: absolute;
    width: 200%; height: 200%;
    top: -50%; left: -50%;
    transform-origin: 50% 50%;
    /* geen CSS transition hier — wordt via JS op animationframe gedaan */
    z-index: 1;
  }

  /* Vintage sepia-waas over de kaart */
  .map-overlay {
    position: absolute; inset: 0; border-radius: 50%;
    background: rgba(120,70,10,0.22);
    pointer-events: none; z-index: 6;
    mix-blend-mode: multiply;
  }

  .leaflet-control-attribution { font-size: 7px !important; opacity: 0.4; }
  .leaflet-control-zoom { display: none !important; }

  /* Jij — statisch middelpunt, draait nooit mee */
  .you-dot {
    position: absolute; top: 50%; left: 50%;
    width: 18px; height: 18px;
    transform: translate(-50%,-50%);
    z-index: 20; pointer-events: none;
  }
  .you-dot::after {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff 0%, #3af 45%, #06c 100%);
    border: 2px solid #fff;
    box-shadow: 0 0 10px rgba(0,120,255,.9), 0 0 0 5px rgba(0,120,255,.15);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 10px rgba(0,120,255,.9),0 0 0 5px rgba(0,120,255,.12); }
    50%      { box-shadow: 0 0 16px rgba(0,120,255,1), 0 0 0 9px rgba(0,120,255,.06); }
  }

  /* Zoom knoppen boven kaartvenster */
  .zoom-bar {
    position: absolute; left: 18.5%; top: 50%;
    transform: translateY(-50%);
    z-index: 30; display: flex; flex-direction: column; gap: 4px;
  }
  .zoom-btn {
    width: 26px; height: 26px;
    background: rgba(20,12,4,.88);
    border: 1px solid var(--brass-dark);
    color: var(--brass); font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border-radius: 2px; user-select: none;
    font-family: 'Cinzel', serif;
  }

  /* Kaart aan/uit */
  .map-toggle {
    position: absolute; bottom: 18.5%; right: 18.5%;
    z-index: 30;
    background: rgba(20,12,4,.88);
    border: 1px solid var(--brass-dark);
    color: var(--brass); font-size: 0.62rem;
    font-family: 'Cinzel', serif; letter-spacing: .05em;
    padding: 4px 6px; border-radius: 2px; cursor: pointer;
  }

  /* ── NAALD ── */
  #needle-layer {
    position: absolute; inset: 17%; border-radius: 50%;
    z-index: 22; pointer-events: none;
  }
  #needle-svg {
    width: 100%; height: 100%;
    transform-origin: center center;
    transition: transform 0.45s cubic-bezier(.25,.46,.45,.94);
  }

  /* Waypoint-stippen op ring */
  .ring-dot {
    position: absolute;
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.5);
    transform: translate(-50%,-50%);
    z-index: 9; display: none;
    box-shadow: 0 0 8px currentColor;
    transition: left .4s ease, top .4s ease;
  }
  .ring-dot.active-dot { width: 18px; height: 18px; border-color: #fff; }

  /* Glasglans */
  .glass-layer {
    position: absolute; inset: 17%; border-radius: 50%;
    background: radial-gradient(ellipse at 28% 22%, rgba(255,255,255,.12) 0%, transparent 52%);
    z-index: 25; pointer-events: none;
  }

  .center-pin {
    position: absolute; top: 50%; left: 50%;
    width: 18px; height: 18px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%,#fff8d0,#c9972a 50%,#5e3a00);
    border: 1px solid #2a1c04;
    transform: translate(-50%,-50%);
    z-index: 26; box-shadow: 0 0 6px rgba(0,0,0,.7);
  }

  .cardinal {
    position: absolute; font-family: 'Cinzel', serif;
    font-size: clamp(8px,2vw,13px); font-weight: 700;
    color: var(--brass); z-index: 8;
    transform: translate(-50%,-50%);
    text-shadow: 0 0 5px rgba(0,0,0,.9); pointer-events: none;
  }

  /* ── INFO PANEL ── */
  .info-panel {
    margin-top: 11px; width: min(92vw,430px);
    background: rgba(20,12,4,.93);
    border: 1px solid var(--brass-dark); border-radius: 3px;
    padding: 8px 14px;
  }
  .status-row {
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px;
    color: var(--brass); font-family: 'Cinzel', serif;
    font-size: clamp(.58rem,1.7vw,.7rem); letter-spacing: .05em;
  }
  .dist-badge {
    font-size: clamp(1rem,4vw,1.4rem); font-family: 'Cinzel', serif;
    color: var(--cream); text-align: center; margin: 5px 0 2px; letter-spacing: .1em;
  }
  .dist-label { text-align: center; font-size: .67rem; color: var(--brass-dark); letter-spacing: .1em; }
  #heading-display { text-align: center; font-size: .62rem; color: rgba(200,160,40,.5); margin-top: 2px; }

  /* ── WAYPOINTS ── */
  .waypoints { margin-top: 10px; width: min(92vw,430px); }

  .wp-block {
    background: rgba(20,12,4,.88); border: 1px solid;
    border-radius: 3px; padding: 7px 10px; margin-bottom: 7px;
  }
  .wp-block.home { border-color: var(--gold-home); }
  .wp-block.vac  { border-color: var(--green-vac); }
  .wp-block.dest { border-color: var(--red-dest); }
  .wp-block.pers { border-color: var(--orange-pers); }

  .wp-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .wp-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .wp-block.home .wp-dot  { background: var(--gold-home);   box-shadow: 0 0 5px var(--gold-home); }
  .wp-block.vac  .wp-dot  { background: var(--green-vac);   box-shadow: 0 0 5px var(--green-vac); }
  .wp-block.dest .wp-dot  { background: var(--red-dest);    box-shadow: 0 0 5px var(--red-dest); }
  .wp-block.pers .wp-dot  { background: var(--orange-pers); box-shadow: 0 0 5px var(--orange-pers); }

  .wp-label { font-family: 'Cinzel', serif; font-size: .64rem; letter-spacing: .1em; flex: 1; }
  .wp-block.home .wp-label { color: var(--gold-home); }
  .wp-block.vac  .wp-label { color: var(--green-vac); }
  .wp-block.dest .wp-label { color: var(--red-dest); }
  .wp-block.pers .wp-label { color: var(--orange-pers); }

  .wp-row { display: flex; gap: 5px; }
  .wp-input {
    flex: 1; min-width: 0;
    background: rgba(0,0,0,.5); border: 1px solid rgba(200,160,40,.3);
    color: var(--cream); font-family: 'IM Fell English', serif;
    font-size: .78rem; padding: 5px 7px; border-radius: 2px; outline: none;
  }
  .wp-input:focus { border-color: var(--brass); }
  .wp-input::placeholder { color: rgba(200,160,40,.3); }

  .wp-btn {
    background: rgba(200,160,40,.1); border: 1px solid var(--brass-dark);
    color: var(--brass); font-family: 'Cinzel', serif;
    font-size: .59rem; letter-spacing: .07em; padding: 5px 8px;
    cursor: pointer; border-radius: 2px; white-space: nowrap; transition: background .15s;
  }
  .wp-btn:active { background: rgba(200,160,40,.3); }
  .wp-dist { font-size: .63rem; color: rgba(200,160,40,.55); margin-top: 3px; min-height: 13px; }

  .target-selector { display: flex; gap: 5px; margin-bottom: 8px; }
  .target-btn {
    flex: 1; padding: 6px 2px; border-radius: 2px;
    font-family: 'Cinzel', serif; font-size: .56rem; letter-spacing: .04em;
    cursor: pointer; border: 1px solid; text-align: center; opacity: .45; transition: all .2s;
  }
  .target-btn.active { opacity: 1; }
  .target-btn.home-t { border-color: var(--gold-home);   color: var(--gold-home);   background: rgba(255,215,0,.07); }
  .target-btn.vac-t  { border-color: var(--green-vac);   color: var(--green-vac);   background: rgba(46,204,113,.07); }
  .target-btn.dest-t { border-color: var(--red-dest);    color: var(--red-dest);    background: rgba(204,34,34,.07); }
  .target-btn.pers-t { border-color: var(--orange-pers); color: var(--orange-pers); background: rgba(255,140,0,.07); }
  .target-btn.home-t.active { background: rgba(255,215,0,.2); }
  .target-btn.vac-t.active  { background: rgba(46,204,113,.2); }
  .target-btn.dest-t.active { background: rgba(204,34,34,.2); }
  .target-btn.pers-t.active { background: rgba(255,140,0,.2); }

  .start-row { display: flex; gap: 7px; margin-top: 7px; }
  .main-btn {
    flex: 1; padding: 9px;
    background: rgba(200,160,40,.1); border: 1px solid var(--brass);
    color: var(--brass); font-family: 'Cinzel', serif;
    font-size: .67rem; letter-spacing: .09em;
    cursor: pointer; border-radius: 2px; transition: background .2s;
  }
  .main-btn:active { background: rgba(200,160,40,.28); }

  .error-msg {
    color: #e07070; font-size: .67rem; text-align: center;
    margin-top: 5px; min-height: 15px; font-style: italic;
  }
</style>
</head>
<body>

<h1>⚓ TERREIN KOMPAS ⚓</h1>

<div class="compass-wrap" id="compass">

  <div class="compass-rim"></div>

  <div class="degree-ring">
    <svg id="ring-svg" viewBox="0 0 400 400"></svg>
  </div>

  <!-- N Z O W -->
  <div class="cardinal" style="top:8%;left:50%">N</div>
  <div class="cardinal" style="top:92%;left:50%">Z</div>
  <div class="cardinal" style="top:50%;left:93%">O</div>
  <div class="cardinal" style="top:50%;left:7%">W</div>

  <!-- Waypoint-stippen op ring -->
  <div class="ring-dot" id="dot-home" style="color:var(--gold-home);background:var(--gold-home)"></div>
  <div class="ring-dot" id="dot-vac"  style="color:var(--green-vac);background:var(--green-vac)"></div>
  <div class="ring-dot" id="dot-dest" style="color:var(--red-dest);background:var(--red-dest)"></div>
  <div class="ring-dot" id="dot-pers" style="color:var(--orange-pers);background:var(--orange-pers)"></div>

  <!-- Kaart venster -->
  <div class="map-viewport" id="map-viewport">
    <div id="map"></div>
    <div class="map-overlay"></div>
  </div>

  <!-- Jouw positie (statisch midden) -->
  <div class="you-dot" id="you-dot"></div>

  <!-- Zoom -->
  <div class="zoom-bar">
    <div class="zoom-btn" onclick="doZoom(1)">+</div>
    <div class="zoom-btn" onclick="doZoom(-1)">−</div>
  </div>

  <!-- Kaart aan/uit -->
  <div class="map-toggle" id="map-toggle" onclick="toggleMap()">🗺 KAART</div>

  <!-- Naald -->
  <div id="needle-layer">
    <svg id="needle-svg" viewBox="0 0 200 200">
      <defs>
        <filter id="ns" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="rgba(0,0,0,.6)"/>
        </filter>
      </defs>
      <polygon points="100,18 109,92 100,104 91,92"  fill="#cc2222" filter="url(#ns)"/>
      <polygon points="100,18 104,36 100,50 96,36"   fill="#ff5555" opacity=".5"/>
      <polygon points="100,182 109,108 100,96 91,108" fill="#2a1c04" filter="url(#ns)"/>
      <polygon points="100,88 106,100 100,112 94,100" fill="#c9972a"/>
    </svg>
  </div>

  <div class="glass-layer"></div>
  <div class="center-pin"></div>

</div>

<!-- Info panel -->
<div class="info-panel">
  <div class="status-row">
    <span id="status-koers">Koers: —</span>
    <span id="status-nauwk">Nauwkeurigheid: —</span>
    <span id="status-gps">GPS: wacht…</span>
  </div>
  <div class="dist-badge" id="dist-main">— km</div>
  <div class="dist-label"  id="dist-label">tot bestemming (hemelsbreed)</div>
  <div id="heading-display"></div>
</div>

<!-- Waypoints -->
<div class="waypoints">

  <div class="target-selector">
    <div class="target-btn home-t active" id="btn-t-home" onclick="setActiveTarget('home')">🏠 THUIS</div>
    <div class="target-btn vac-t"         id="btn-t-vac"  onclick="setActiveTarget('vac')">🌿 VAKANTIE</div>
    <div class="target-btn dest-t"        id="btn-t-dest" onclick="setActiveTarget('dest')">🎯 DOEL</div>
    <div class="target-btn pers-t"        id="btn-t-pers" onclick="setActiveTarget('pers')">🧡 PERSOON</div>
  </div>

  <div class="wp-block home">
    <div class="wp-header"><div class="wp-dot"></div><div class="wp-label">THUIS ADRES</div></div>
    <div class="wp-row">
      <input class="wp-input" id="inp-home" type="text" placeholder="Straat, Stad…" autocomplete="off" spellcheck="false">
      <button class="wp-btn" onclick="geocodeWaypoint('home')">ZOEK</button>
      <button class="wp-btn" onclick="useCurrentLocation('home')">📍</button>
    </div>
    <div class="wp-dist" id="dist-home"></div>
  </div>

  <div class="wp-block vac">
    <div class="wp-header"><div class="wp-dot"></div><div class="wp-label">VAKANTIE / TUSSENSTOP</div></div>
    <div class="wp-row">
      <input class="wp-input" id="inp-vac" type="text" placeholder="Hotel, Camping, Stad…" autocomplete="off" spellcheck="false">
      <button class="wp-btn" onclick="geocodeWaypoint('vac')">ZOEK</button>
    </div>
    <div class="wp-dist" id="dist-vac"></div>
  </div>

  <div class="wp-block dest">
    <div class="wp-header"><div class="wp-dot"></div><div class="wp-label">BESTEMMING</div></div>
    <div class="wp-row">
      <input class="wp-input" id="inp-dest" type="text" placeholder="Bestemming, Landmark…" autocomplete="off" spellcheck="false">
      <button class="wp-btn" onclick="geocodeWaypoint('dest')">ZOEK</button>
    </div>
    <div class="wp-dist" id="dist-dest"></div>
  </div>

  <div class="wp-block pers">
    <div class="wp-header"><div class="wp-dot"></div><div class="wp-label">OP TE HALEN PERSOON</div></div>
    <div class="wp-row">
      <input class="wp-input" id="inp-pers" type="text" placeholder="Adres persoon…" autocomplete="off" spellcheck="false">
      <button class="wp-btn" onclick="geocodeWaypoint('pers')">ZOEK</button>
    </div>
    <div class="wp-dist" id="dist-pers"></div>
  </div>

  <div class="start-row">
    <button class="main-btn" onclick="startCompass()">▶ KOMPAS ACTIVEREN</button>
    <button class="main-btn" onclick="saveWaypoints()" style="flex:0.42">💾 SLA OP</button>
  </div>
  <div class="error-msg" id="error-msg"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

// ── STATE ──
const S = {
  lat: null, lon: null, heading: null, accuracy: null,
  mapVisible: true, zoom: 16, mapReady: false,
  waypoints: {
    home: {lat:null,lon:null,name:''},
    vac:  {lat:null,lon:null,name:''},
    dest: {lat:null,lon:null,name:''},
    pers: {lat:null,lon:null,name:''}
  },
  activeTarget: 'home'
};

const WP_COLOR = {home:'#ffd700',vac:'#2ecc71',dest:'#cc2222',pers:'#ff8c00'};
const WP_LABEL = {home:'tot thuis',vac:'tot vakantieadres',dest:'tot bestemming',pers:'tot op te halen persoon'};

// ── LEAFLET ──
let map, markers = {};

function initMap(lat, lon) {
  if (S.mapReady) return;
  S.mapReady = true;

  map = L.map('map', {
    center: [lat, lon], zoom: S.zoom,
    zoomControl: false, attributionControl: true,
    dragging: false, scrollWheelZoom: false,
    doubleClickZoom: false, touchZoom: false,
    boxZoom: false, keyboard: false
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19, minZoom: 10
  }).addTo(map);

  // Leaflet resize fix voor circulair viewport
  setTimeout(() => map.invalidateSize(), 300);

  for (const k of ['home','vac','dest','pers']) refreshMarker(k);
}

function refreshMarker(k) {
  if (!map) return;
  const w = S.waypoints[k];
  if (!w.lat) { if (markers[k]) { map.removeLayer(markers[k]); delete markers[k]; } return; }

  const icon = L.divIcon({
    className:'', iconSize:[14,14], iconAnchor:[7,7],
    html:`<div style="width:14px;height:14px;border-radius:50%;
      background:${WP_COLOR[k]};border:2.5px solid #fff;
      box-shadow:0 0 7px ${WP_COLOR[k]};"></div>`
  });

  if (markers[k]) markers[k].setLatLng([w.lat,w.lon]).setIcon(icon);
  else markers[k] = L.marker([w.lat,w.lon],{icon,interactive:false})
    .bindTooltip(w.name||WP_LABEL[k],{permanent:false,direction:'top',className:'leaflet-tooltip'})
    .addTo(map);
}

function doZoom(d) {
  S.zoom = Math.min(19, Math.max(10, S.zoom + d));
  if (map) map.setZoom(S.zoom, {animate: false});
}

function toggleMap() {
  S.mapVisible = !S.mapVisible;
  document.getElementById('map-viewport').style.opacity = S.mapVisible ? '1' : '0';
  document.getElementById('map-toggle').textContent = S.mapVisible ? '🗺 KAART' : '🗺 UIT';
}

// Smooth kaartrotatie via requestAnimationFrame
let _targetRot = 0, _currentRot = 0, _rafId = null;
function rotateMap(heading) {
  _targetRot = -heading;
  if (!_rafId) _rafId = requestAnimationFrame(animateMap);
}
function animateMap() {
  _rafId = null;
  let diff = _targetRot - _currentRot;
  // Kortste pad
  while (diff >  180) diff -= 360;
  while (diff < -180) diff += 360;
  _currentRot += diff * 0.12;
  document.getElementById('map').style.transform = `rotate(${_currentRot}deg)`;
  if (Math.abs(diff) > 0.05) _rafId = requestAnimationFrame(animateMap);
}

// ── GRADEN RING ──
(function drawRing() {
  const svg = document.getElementById('ring-svg');
  const cx=200, cy=200, r=190;
  let h = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#1e160a" stroke="#4a3605" stroke-width="3"/>`;

  for (let deg=0; deg<360; deg++) {
    const rad=(deg-90)*Math.PI/180;
    const maj=deg%10===0, mid=deg%5===0&&!maj;
    const len=maj?18:mid?10:5;
    const col=deg%90===0?'#c9972a':maj?'#9a7030':'#5a4020';
    const x1=cx+(r-4)*Math.cos(rad), y1=cy+(r-4)*Math.sin(rad);
    const x2=cx+(r-4-len)*Math.cos(rad), y2=cy+(r-4-len)*Math.sin(rad);
    h+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${maj?1.5:.8}"/>`;
    if (maj && deg%30===0 && deg%90!==0) {
      const tx=cx+(r-30)*Math.cos(rad), ty=cy+(r-30)*Math.sin(rad);
      h+=`<text x="${tx}" y="${ty}" text-anchor="middle" dominant-baseline="middle"
        font-family="Cinzel,serif" font-size="11" fill="#9a7030"
        transform="rotate(${deg},${tx},${ty})">${deg}</text>`;
    }
  }
  h+=`<circle cx="${cx}" cy="${cy}" r="${r-22}" fill="none" stroke="#4a3605" stroke-width="1" opacity=".4"/>`;
  svg.innerHTML=h;
})();

// ── GEOCODING ──
async function geocodeWaypoint(k) {
  const input = document.getElementById('inp-'+k).value.trim();
  if (!input) { showMsg('Voer een adres in.'); return; }
  showMsg('Zoeken…');
  try {
    const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(input)}&format=json&limit=1`;
    const data=await (await fetch(url,{headers:{'Accept-Language':'nl'}})).json();
    if (!data.length) { showMsg('Adres niet gevonden. Probeer specifieker.'); return; }
    S.waypoints[k]={lat:parseFloat(data[0].lat),lon:parseFloat(data[0].lon),
      name:data[0].display_name.split(',').slice(0,2).join(',')};
    document.getElementById('inp-'+k).value=S.waypoints[k].name;
    refreshMarker(k); showMsg('✓ Gevonden'); setTimeout(()=>showMsg(''),1500); updateAll();
  } catch(e) {
    const pts=input.split(',').map(s=>parseFloat(s.trim()));
    if (pts.length===2&&!isNaN(pts[0])&&!isNaN(pts[1])) {
      S.waypoints[k]={lat:pts[0],lon:pts[1],name:input};
      refreshMarker(k); showMsg('Coördinaten ingesteld.'); updateAll();
    } else showMsg('Geen internet. Typ: lat,lon  (bijv. 52.37,4.89)');
  }
}

for (const k of ['home','vac','dest','pers'])
  document.getElementById('inp-'+k).addEventListener('keydown', e=>{ if(e.key==='Enter') geocodeWaypoint(k); });

function useCurrentLocation(k) {
  if (!S.lat) { showMsg('GPS nog niet actief. Druk eerst op Kompas Activeren.'); return; }
  S.waypoints[k]={lat:S.lat,lon:S.lon,name:'Huidige positie'};
  document.getElementById('inp-'+k).value='Huidige positie';
  refreshMarker(k); showMsg('Positie ingesteld.'); updateAll();
}

// ── ACTIVE TARGET ──
function setActiveTarget(k, save=true) {
  S.activeTarget=k;
  for (const j of ['home','vac','dest','pers']) {
    document.getElementById('btn-t-'+j).classList.toggle('active',j===k);
    document.getElementById('dot-'+j).classList.toggle('active-dot',j===k);
  }
  if (save) saveWaypoints();
  updateAll();
}

// ── OPSLAAN ──
function saveWaypoints() {
  localStorage.setItem('kompas3',JSON.stringify({wp:S.waypoints,at:S.activeTarget}));
  showMsg('Opgeslagen ✓'); setTimeout(()=>showMsg(''),2000);
}
(function load() {
  try {
    const d=JSON.parse(localStorage.getItem('kompas3')||'{}');
    if (d.wp) { for (const k of ['home','vac','dest','pers']) if (d.wp[k]?.lat) { S.waypoints[k]=d.wp[k]; document.getElementById('inp-'+k).value=d.wp[k].name||''; } }
    if (d.at) setActiveTarget(d.at,false);
  } catch(e){}
})();

// ── GPS ──
function startGPS() {
  if (!navigator.geolocation) { showMsg('GPS niet beschikbaar.'); return; }
  navigator.geolocation.watchPosition(pos=>{
    const first=S.lat===null;
    S.lat=pos.coords.latitude; S.lon=pos.coords.longitude;
    S.accuracy=Math.round(pos.coords.accuracy);
    document.getElementById('status-gps').textContent='GPS: ✓';
    document.getElementById('status-nauwk').textContent=`±${S.accuracy}m`;
    if (first) { initMap(S.lat,S.lon); for (const k of ['home','vac','dest','pers']) refreshMarker(k); }
    else if (map) map.setView([S.lat,S.lon],S.zoom,{animate:false});
    updateAll();
  }, err=>{ document.getElementById('status-gps').textContent='GPS: ✗'; showMsg('GPS fout: '+err.message); },
  {enableHighAccuracy:true,maximumAge:2000,timeout:20000});
}

// ── KOMPAS ──
function startCompass() {
  startGPS();
  if (typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function') {
    DeviceOrientationEvent.requestPermission()
      .then(r=>{ if(r==='granted') listenOri(); else showMsg('Kompas toegang geweigerd.'); })
      .catch(e=>showMsg('Fout: '+e.message));
  } else listenOri();
}
function listenOri() {
  window.addEventListener('deviceorientationabsolute',onOri,true);
  window.addEventListener('deviceorientation',onOri,true);
}

let _lh=null;
function onOri(e) {
  let h=null;
  if (e.webkitCompassHeading!=null) h=e.webkitCompassHeading;
  else if (e.absolute&&e.alpha!=null) h=(360-e.alpha)%360;
  else if (e.alpha!=null) h=(360-e.alpha)%360;
  if (h===null) return;
  if (_lh!==null) { let d=h-_lh; if(d>180)d-=360; if(d<-180)d+=360; h=_lh+d*0.25; }
  _lh=h; S.heading=h;
  document.getElementById('status-koers').textContent=`Koers: ${Math.round(h)}°`;
  document.getElementById('heading-display').textContent=`${toCard(h)} — ${Math.round(h)}°`;
  rotateMap(h);
  updateAll();
}

function toCard(d) {
  return ['N','NNO','NO','ONO','O','OZO','ZO','ZZO','Z','ZZW','ZW','WZW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];
}

// ── BEREKENINGEN ──
function hav(la1,lo1,la2,lo2) {
  const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function brg(la1,lo1,la2,lo2) {
  const dO=(lo2-lo1)*Math.PI/180;
  const y=Math.sin(dO)*Math.cos(la2*Math.PI/180);
  const x=Math.cos(la1*Math.PI/180)*Math.sin(la2*Math.PI/180)-Math.sin(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.cos(dO);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

// ── UPDATE ──
function updateAll() {
  if (!S.lat) return;
  const w=S.waypoints;

  for (const k of ['home','vac','dest','pers']) {
    if (w[k].lat!==null) {
      const d=hav(S.lat,S.lon,w[k].lat,w[k].lon);
      document.getElementById('dist-'+k).textContent=d<1?`${Math.round(d*1000)} m`:`${d.toFixed(2)} km`;
    }
  }

  for (const k of ['home','vac','dest','pers']) {
    const dot=document.getElementById('dot-'+k);
    if (w[k].lat!==null) { placeDot(dot,brg(S.lat,S.lon,w[k].lat,w[k].lon)); dot.style.display='block'; }
    else dot.style.display='none';
  }

  const a=w[S.activeTarget];
  if (a.lat!==null) {
    const b=brg(S.lat,S.lon,a.lat,a.lon);
    if (S.heading!==null)
      document.getElementById('needle-svg').style.transform=`rotate(${b-S.heading}deg)`;
    const d=hav(S.lat,S.lon,a.lat,a.lon);
    document.getElementById('dist-main').textContent=d<1?`${Math.round(d*1000)} m`:`${d.toFixed(2)} km`;
    document.getElementById('dist-label').textContent=WP_LABEL[S.activeTarget]+' (hemelsbreed)';
  }
}

function placeDot(el,bearingDeg) {
  const c=document.getElementById('compass'), sz=c.offsetWidth, ctr=sz/2, r=sz*0.415;
  const rad=(bearingDeg-90)*Math.PI/180;
  el.style.left=(ctr+r*Math.cos(rad))+'px';
  el.style.top =(ctr+r*Math.sin(rad))+'px';
}

function showMsg(m) { document.getElementById('error-msg').textContent=m; }

// ── DEMO (?demo in URL) ──
if (location.search.includes('demo')) {
  S.lat=52.3676; S.lon=4.9041;
  initMap(52.3676,4.9041);
  document.getElementById('status-gps').textContent='GPS: ✓ demo';
  let dh=0;
  setInterval(()=>{
    dh=(dh+0.6)%360; S.heading=dh;
    document.getElementById('status-koers').textContent=`Koers: ${Math.round(dh)}°`;
    document.getElementById('heading-display').textContent=`${toCard(dh)} — ${Math.round(dh)}°`;
    rotateMap(dh); updateAll();
  },50);
}
</script>
