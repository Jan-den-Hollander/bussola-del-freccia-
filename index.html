<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Antiek Scheepskompas Navigatie</title>
    <style>
        :root {
            --brass: #b8860b;
            --dark-brass: #5e4506;
            --rim-shadow: rgba(0,0,0,0.6);
        }

        body {
            margin: 0;
            background-color: #1a120b;
            color: #d4af37;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Georgia', serif;
            overflow: hidden;
            touch-action: none; /* Voorkomt standaard browser-zoom bij multitouch */
        }

        /* Het hoofdinstrument */
        .compass-housing {
            position: relative;
            width: 92vw;
            height: 92vw;
            max-width: 450px;
            max-height: 450px;
            border-radius: 50%;
            border: 15px solid var(--dark-brass);
            box-shadow: 0 0 50px #000, inset 0 0 30px #000;
            background: var(--brass);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        /* Statische ring met graden */
        .degree-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            z-index: 10;
            pointer-events: none;
            background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png');
            opacity: 0.9;
        }

        .degree-marker {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            color: #2c1e16;
            padding-top: 8px;
        }

        /* Venster waar de kaart in leeft */
        .map-viewport {
            position: relative;
            width: 82%;
            height: 82%;
            border-radius: 50%;
            overflow: hidden;
            background: #2c1e16;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
            z-index: 2;
        }

        /* De dynamische kaart-laag */
        #map-canvas {
            position: absolute;
            width: 2000px; /* Groot werkvlak voor schuiven en zoomen */
            height: 2000px;
            top: 50%;
            left: 50%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: 100% 100%;
            transform-origin: center center;
            filter: sepia(0.7) contrast(1.2) brightness(0.85);
            transition: transform 0.1s linear;
        }

        /* De statische naald / Lubber Line */
        .needle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 85%;
            background: linear-gradient(to bottom, #900 50%, #222 50%);
            transform: translate(-50%, -50%);
            z-index: 20;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .center-pin {
            position: absolute;
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, #ffd700, #8b4513);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 21;
            border: 1px solid #000;
        }

        /* Glas-reflectie */
        .glass {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15) 0%, transparent 60%);
            z-index: 25;
            pointer-events: none;
        }

        #ui-controls {
            margin-top: 25px;
            text-align: center;
            z-index: 30;
        }

        button {
            padding: 12px 24px;
            background: #443305;
            color: #d4af37;
            border: 2px solid #b8860b;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin: 5px;
        }

        #info-box {
            font-size: 0.8rem;
            margin-bottom: 10px;
            color: #8b5a2b;
        }
    </style>
</head>
<body>

    <div class="compass-housing">
        <div class="degree-ring" id="ring"></div>
        <div class="map-viewport">
            <div id="map-canvas"></div>
            <div class="glass"></div>
        </div>
        <div class="needle"></div>
        <div class="center-pin"></div>
    </div>

    <div id="ui-controls">
        <div id="info-box">Selecteer een kaartafbeelding om te beginnen</div>
        <input type="file" id="upload" accept="image/*" style="display:none">
        <button onclick="document.getElementById('upload').click()">Laad Kaart</button>
        <button onclick="startCompass()">Start Kompas</button>
    </div>

<script>
    const map = document.getElementById('map-canvas');
    const ring = document.getElementById('ring');
    const info = document.getElementById('info-box');
    
    let currentScale = 1.0;
    let currentHeading = 0;
    let initialPinchDist = 0;

    // Teken de graden op de ring
    for(let i=0; i<360; i+=30) {
        let mark = document.createElement('div');
        mark.className = 'degree-marker';
        mark.innerText = i + '°';
        mark.style.transform = `rotate(${i}deg)`;
        ring.appendChild(mark);
    }

    // Kaart uploaden
    document.getElementById('upload').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            map.style.backgroundImage = `url(${event.target.result})`;
            info.innerText = "Kaart geladen. Klik op 'Start Kompas'.";
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // Zoom-logica (Pinch-to-zoom voor mobiel)
    window.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            initialPinchDist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
        }
    });

    window.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && initialPinchDist > 0) {
            let newDist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            let zoomFactor = newDist / initialPinchDist;
            
            currentScale = Math.min(Math.max(0.2, currentScale * zoomFactor), 4);
            initialPinchDist = newDist;
            updateDisplay();
        }
    });

    // Muiswiel zoom voor desktop testen
    window.addEventListener('wheel', (e) => {
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        currentScale = Math.min(Math.max(0.2, currentScale * delta), 4);
        updateDisplay();
    });

    function startCompass() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(response => {
                    if (response == 'granted') {
                        window.addEventListener('deviceorientation', handleMove, true);
                    } else {
                        alert("Toegang tot sensoren geweigerd.");
                    }
                })
                .catch(console.error);
        } else {
            window.addEventListener('deviceorientation', handleMove, true);
        }
        info.innerText = "Kompas actief. Beweeg je toestel.";
    }

    function handleMove(event) {
        // iOS gebruikt webkitCompassHeading, Android gebruikt alpha
        let heading = event.webkitCompassHeading || (360 - event.alpha);
        
        if (heading !== undefined) {
            currentHeading = heading;
            updateDisplay();
        }
    }

    function updateDisplay() {
        // De kern van de visualisatie: Rotatie en Zoom tegelijk
        map.style.transform = `translate(-50%, -50%) rotate(${-currentHeading}deg) scale(${currentScale})`;
        info.innerText = `Koers: ${Math.round(currentHeading)}° | Zoom: ${currentScale.toFixed(1)}x`;
    }
</script>
</body>
</html>
