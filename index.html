<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Antiek Scheepskompas</title>
    <style>
        :root { --brass: #b8860b; --dark-brass: #5e4506; }
        body { margin: 0; background: #1a120b; color: #d4af37; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Georgia', serif; overflow: hidden; touch-action: none; }
        
        .compass-housing { position: relative; width: 92vw; height: 92vw; max-width: 450px; max-height: 450px; border-radius: 50%; border: 15px solid var(--dark-brass); box-shadow: 0 0 50px #000, inset 0 0 30px #000; background: var(--brass); display: flex; align-items: center; justify-content: center; z-index: 1; }
        .degree-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; z-index: 10; pointer-events: none; background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png'); opacity: 0.9; }
        .degree-marker { position: absolute; width: 100%; height: 100%; text-align: center; font-weight: bold; font-size: 14px; color: #2c1e16; padding-top: 8px; }
        
        .map-viewport { position: relative; width: 82%; height: 82%; border-radius: 50%; overflow: hidden; background: #2c1e16; box-shadow: inset 0 0 40px rgba(0,0,0,0.8); z-index: 2; cursor: crosshair; }
        #map-container { position: absolute; width: 3000px; height: 3000px; top: 50%; left: 50%; transform-origin: center center; transition: transform 0.1s linear; }
        #map-img { width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; filter: sepia(0.6) contrast(1.1); }
        
        /* --- GEWIJZIGDE BESTEMMING STIP (NU ROOD) --- */
        #target-dot { 
            position: absolute; 
            width: 24px;  /* Iets groter voor betere zichtbaarheid */
            height: 24px; 
            background: #ff0000; /* Helder rood */
            border: 3px solid #ffffff; /* Brede witte rand voor contrast op donkere kaarten */
            border-radius: 50%; 
            display: none; 
            transform: translate(-50%, -50%); 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.8), 0 0 5px rgba(0,0,0,0.5); /* Rode gloed + schaduw */
            z-index: 5; /* Zorgt dat de stip bovenop de kaartafbeelding ligt */
        }

        .needle { position: absolute; top: 50%; left: 50%; width: 8px; height: 85%; background: linear-gradient(to bottom, #900 50%, #222 50%); transform: translate(-50%, -50%); z-index: 20; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); pointer-events: none; }
        .center-pin { position: absolute; width: 16px; height: 16px; background: radial-gradient(circle, #ffd700, #8b4513); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 21; border: 1px solid #000; }
        .glass { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1) 0%, transparent 60%); z-index: 25; pointer-events: none; }

        #ui { margin-top: 20px; text-align: center; z-index: 30; }
        button { padding: 10px 15px; background: #443305; color: gold; border: 1px solid gold; margin: 5px; cursor: pointer; font-family: 'Georgia', serif; }
        #status { font-size: 0.9rem; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="compass-housing">
    <div class="degree-ring" id="ring"></div>
    <div class="map-viewport" id="viewport">
        <div id="map-container">
            <div id="map-img"></div>
            <div id="target-dot"></div>
        </div>
        <div class="glass"></div>
    </div>
    <div class="needle"></div>
    <div class="center-pin"></div>
</div>

<div id="ui">
    <div id="status">1. Laad kaart | 2. Sleep naar midden | 3. Tik bestemming</div>
    <input type="file" id="upload" accept="image/*" style="display:none">
    <button onclick="document.getElementById('upload').click()">Kaart</button>
    <button onclick="startCompass()">Start</button>
    <button onclick="resetMap()">Reset</button>
</div>

<script>
    let scale = 1, heading = 0, posX = -1500, posY = -1500;
    let isDragging = false, startX, startY;
    let initialPinchDist = 0;

    const container = document.getElementById('map-container');
    const img = document.getElementById('map-img');
    const dot = document.getElementById('target-dot');
    const ring = document.getElementById('ring');

    for(let i=0; i<360; i+=30) {
        let m = document.createElement('div'); m.className='degree-marker'; m.innerText=i+'°'; m.style.transform=`rotate(${i}deg)`; ring.appendChild(m);
    }

    document.getElementById('upload').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { img.style.backgroundImage = `url(${ev.target.result})`; };
        reader.readAsDataURL(e.target.files[0]);
    };

    // SLEPEN & TIKKEN
    document.getElementById('viewport').addEventListener('pointerdown', (e) => {
        isDragging = true;
        startX = e.clientX - posX;
        startY = e.clientY - posY;
    });

    window.addEventListener('pointermove', (e) => {
        if (!isDragging || e.target.closest('#ui')) return;
        posX = e.clientX - startX;
        posY = e.clientY - startY;
        update();
    });

    window.addEventListener('pointerup', (e) => {
        if (isDragging && Math.abs(e.clientX - (startX + posX)) < 5) {
            // Het was een tik, geen sleep: plaats bestemming
            const rect = container.getBoundingClientRect();
            dot.style.display = 'block';
            // Correctie voor de transform-origin (center center) en de schaal
            dot.style.left = (e.clientX - rect.left) / scale + 'px';
            dot.style.top = (e.clientY - rect.top) / scale + 'px';
        }
        isDragging = false;
    });

    // ZOOMEN (Pinch-to-zoom)
    window.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) initialPinchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
    });
    window.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && initialPinchDist > 0) {
            let d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            // Begrens zoom tussen 0.2x en 4x
            scale = Math.min(Math.max(0.2, scale * (d / initialPinchDist)), 4);
            initialPinchDist = d;
            update();
        }
    });
    window.addEventListener('touchend', () => { initialPinchDist = 0; });

    function startCompass() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(res => { if(res=='granted') window.addEventListener('deviceorientation', handleMove); });
        } else { window.addEventListener('deviceorientation', handleMove); }
        document.getElementById('status').innerText = "Kompas actief. Sleep kaart bij.";
    }

    function handleMove(e) {
        heading = e.webkitCompassHeading || (360-e.alpha);
        update();
    }

    function update() {
        // Kern van de visualisatie: Positie + Rotatie + Schaal
        container.style.transform = `translate(${posX}px, ${posY}px) rotate(${-heading}deg) scale(${scale})`;
    }

    function resetMap() { 
        posX = -1500; posY = -1500; scale = 1; heading = 0;
        dot.style.display='none'; 
        update(); 
        document.getElementById('status').innerText = "Gereset. Laad nieuwe kaart of herstart.";
    }
</script>
</body>
</html>
